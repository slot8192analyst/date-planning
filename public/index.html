<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's Next? — 今日の行き先をランダムに決めよう</title>

  <!-- SEO -->
  <meta name="description" content="What's Next? は、行き先・やること・お店などをカードに登録してランダムに引けるアプリです。今日何をするか迷ったときに使ってください。">

  <!-- OGP -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="What's Next? — 今日の行き先をランダムに決めよう">
  <meta property="og:description" content="行き先・やること・お店などをカードに登録してランダムに引けるアプリ。今日何をするか迷ったときに。">
  <meta property="og:image"       content="/whats-next-512.jpg">
  <meta property="og:locale"      content="ja_JP">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="What's Next?">
  <meta name="twitter:description" content="行き先・やること・お店などをカードに登録してランダムに引けるアプリ。">
  <meta name="twitter:image"       content="/whats-next-512.jpg">

  <link rel="icon" type="image/png" sizes="192x192" href="/whats-next-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/whats-next-512.png">
  <link rel="apple-touch-icon" href="/whats-next-192.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>What's Next?</h1>
  </header>

  <main>
    <!-- ランダムピック -->
    <section class="panel">
      <h2>Random Pick</h2>

      <!-- 候補リスト -->
      <div id="shortlist-section">
        <div class="shortlist-header">
          <span class="shortlist-label">候補リスト <span id="shortlist-count">0</span></span>
          <div class="shortlist-header-actions">
            <button id="shortlist-pick-btn" class="shortlist-pick-btn hidden">候補から引く</button>
            <button id="shortlist-clear-btn" class="ghost-btn shortlist-clear-btn hidden">クリア</button>
          </div>
        </div>
        <div id="shortlist-chips" class="shortlist-chips"></div>
        <p id="shortlist-hint" class="shortlist-hint">カード一覧の ☆ を押して候補に追加できます</p>
      </div>

      <div class="pick-divider">— または全カードからランダムに —</div>

      <div class="pick-controls">
        <label>タグで絞り込み</label>
        <div id="filter-tags" class="tag-filter"></div>
        <label><input type="checkbox" id="filter-mode-and"> すべてのタグを含む (AND)</label>
        <label><input type="checkbox" id="unvisited-only"> 未訪問のみ</label>
      </div>
      <button id="pick-btn" class="pick-primary-btn">引く</button>
      <div id="picked" class="picked-area"></div>
      <div id="pick-actions" class="pick-actions hidden">
        <button id="pick-confirm">決定</button>
        <button id="pick-reroll" class="ghost-btn">もう一度引く</button>
        <button id="pick-cancel" class="ghost-btn">キャンセル</button>
      </div>
    </section>

    <!-- カード追加 -->
    <section class="panel">
      <div class="panel-head">
        <h2>Add a Card</h2>
        <button class="toggle-btn add-card-toggle" data-target="add-form-wrapper" aria-expanded="false">
          ＋ カードを追加
        </button>
      </div>
      <div id="add-form-wrapper" class="hidden">
        <form id="add-form">
          <input type="text" id="title" placeholder="タイトル" required>
          <textarea id="description" placeholder="説明"></textarea>
          <input type="text" id="category" placeholder="タグ(カンマ区切り 例: カフェ, 雨の日OK)">
          <input type="text" id="created_by" placeholder="追加した人">
          <select id="image_key"></select>
          <img id="image-preview" class="image-preview hidden" alt="">
          <button type="submit">追加</button>
        </form>
      </div>
    </section>

    <!-- カード一覧 -->
    <section class="panel">
      <div class="panel-head">
        <h2>Cards</h2>
        <button class="toggle-btn" data-target="card-list" aria-expanded="true">表示/非表示</button>
      </div>
      <ul id="card-list" class="card-list compact"></ul>
    </section>

    <!-- 履歴 -->
    <section class="panel">
      <div class="panel-head">
        <h2>History</h2>
        <button class="toggle-btn" data-target="history-list" aria-expanded="true">表示/非表示</button>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </section>
  </main>

  <!-- 編集モーダル（dialog要素） -->
  <dialog id="edit-modal" class="modal-dialog">
    <div class="modal-content">
      <h2>Edit Card</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <label>タイトル</label>
        <input type="text" id="edit-title" required>
        <label>説明</label>
        <textarea id="edit-description"></textarea>
        <label>タグ(カンマ区切り)</label>
        <input type="text" id="edit-category" placeholder="例: カフェ, 雨の日OK">
        <label>追加した人</label>
        <input type="text" id="edit-created_by">
        <label>画像</label>
        <select id="edit-image_key"></select>
        <img id="edit-image-preview" class="image-preview hidden" alt="">
        <div class="modal-actions">
          <button type="button" id="edit-cancel" class="ghost-btn">キャンセル</button>
          <button type="submit">保存</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- 詳細モーダル（dialog要素） -->
  <dialog id="detail-modal" class="modal-dialog">
    <div class="modal-content">
      <div id="detail-content"></div>
      <div class="modal-actions">
        <button type="button" id="detail-close" class="ghost-btn">閉じる</button>
      </div>
    </div>
  </dialog>

  <!-- 紙吹雪用 Canvas（script より前に配置して DOM を確保） -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <script src="/app.js"></script>
</body>
</html>
